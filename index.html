<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudySphere | AI Study Companion</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #8b5cf6;
            --secondary: #3b82f6;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,0.2) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,0.2) 0, transparent 50%);
        }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(139, 92, 246, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(139, 92, 246, 0); } 100% { box-shadow: 0 0 0 0 rgba(139, 92, 246, 0); } }

        header {
            padding: 2rem 5%;
            text-align: center;
            animation: fadeIn 1s ease-out;
        }

        header h1 {
            font-size: 3rem;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        main {
            flex: 1;
            padding: 2rem 5%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .features {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
            animation: fadeIn 1.5s ease-out;
        }

        .feature-btn {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-light);
            padding: 1rem 2rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .feature-btn:hover, .feature-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(139, 92, 246, 0.3);
        }

        .workspace {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: float 6s ease-in-out infinite, fadeIn 2s ease-out;
        }

        textarea {
            width: 100%;
            height: 150px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            padding: 1rem;
            color: var(--text-light);
            font-size: 1rem;
            resize: none;
            outline: none;
            transition: border-color 0.3s ease;
            margin-bottom: 1rem;
        }

        textarea:focus {
            border-color: var(--primary);
        }

        .action-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            animation: pulse 2s infinite;
        }

        .action-btn:hover {
            opacity: 0.9;
        }

        .action-btn:disabled {
            background: #475569;
            cursor: not-allowed;
            animation: none;
        }

        #result-box {
            margin-top: 1.5rem;
            padding: 1.5rem;
            background: rgba(15, 23, 42, 0.8);
            border-radius: 10px;
            border-left: 4px solid var(--secondary);
            display: none;
            white-space: pre-wrap;
            line-height: 1.6;
        }

        /* Loader */
        .loader {
            display: none;
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 1rem auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: auto;
        }

        footer .love {
            color: #ef4444;
            display: inline-block;
            animation: float 2s ease-in-out infinite;
        }

    </style>
</head>
<body>

    <header>
        <h1>StudySphere</h1>
        <p>Your AI Study Companion for smarter, faster learning.</p>
    </header>

    <main>
        <div class="features">
            <button class="feature-btn active" onclick="setMode('explain', this)"><i class="fas fa-brain"></i> Concept Explainer</button>
            <button class="feature-btn" onclick="setMode('quiz', this)"><i class="fas fa-list-check"></i> Generate Quiz</button>
            <button class="feature-btn" onclick="setMode('plan', this)"><i class="fas fa-calendar-alt"></i> Study Planner</button>
            <button class="feature-btn" onclick="setMode('doubt', this)"><i class="fas fa-comments"></i> Doubt Solver</button>
        </div>

        <div class="workspace">
            <h2 id="mode-title" style="margin-bottom: 1rem; font-weight: 600;">Explain a Concept</h2>
            <textarea id="user-input" placeholder="e.g., Explain photosynthesis in simple terms..."></textarea>
            <button class="action-btn" id="submit-btn" onclick="processRequest()">Generate Magic ✨</button>
            <div class="loader" id="loader"></div>
            <div id="result-box"></div>
        </div>
    </main>

    <footer>
        <p>Developed and deployed by Kaman Das ©2026</p>
        <p>Made with Love <span class="love">❤️</span></p>
    </footer>

    <script>
        // =========================================================================
        // Render Backend URL (Updated)
        // =========================================================================
        const BACKEND_URL = "https://studysphere-2-pq77.onrender.com"; 
        
        let currentMode = 'explain';

        const placeholders = {
            'explain': 'e.g., Explain photosynthesis, Black Hole, or Newton\'s laws...',
            'quiz': 'e.g., Create a quiz on World War 2...',
            'plan': 'e.g., Class 10, Science & Math, Exam on 25th Oct, 3 hours a day...',
            'doubt': 'e.g., Why is the sky blue? Solve 2x + 5 = 15...'
        };

        const titles = {
            'explain': 'AI Concept Explainer',
            'quiz': 'Instant Quiz Generator',
            'plan': 'Personalized Study Planner',
            'doubt': 'AI Doubt Solver'
        };

        function setMode(mode, element) {
            currentMode = mode;
            document.getElementById('mode-title').innerText = titles[mode];
            document.getElementById('user-input').placeholder = placeholders[mode];
            document.getElementById('user-input').value = '';
            document.getElementById('result-box').style.display = 'none';
            
            // Update UI buttons
            document.querySelectorAll('.feature-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
        }

        async function processRequest() {
            const input = document.getElementById('user-input').value.trim();
            if (!input) return alert("Please enter some text!");

            const btn = document.getElementById('submit-btn');
            const loader = document.getElementById('loader');
            const resultBox = document.getElementById('result-box');

            // UI Loading state
            btn.disabled = true;
            btn.innerText = "Processing...";
            loader.style.display = "block";
            resultBox.style.display = "none";

            try {
                const response = await fetch(`${BACKEND_URL}/api/study`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: currentMode, payload: input })
                });

                const data = await response.json();

                if (response.ok) {
                    resultBox.innerText = data.result;
                    resultBox.style.display = "block";
                } else {
                    resultBox.innerText = "Error: " + (data.error || "Something went wrong.");
                    resultBox.style.display = "block";
                }
            } catch (error) {
                resultBox.innerText = "Connection error. Make sure the backend is running and the BACKEND_URL is correct.";
                resultBox.style.display = "block";
            } finally {
                btn.disabled = false;
                btn.innerText = "Generate Magic ✨";
                loader.style.display = "none";
            }
        }
    </script>
</body>
</html>
